name: Deploy Service

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # --- SOZLAMALAR ---
            # Har bitta repoda o'sha servis nomini yozing:
            SERVICE_NAME="hw-logistics-service" # <--- SHU YERNI O'ZGARTIRING
            # ------------------

            echo "🚀 $SERVICE_NAME deploy boshlandi..."
            cd ~/hiwelcome/$SERVICE_NAME
            git pull origin main
            cd ~/hiwelcome/hw-infrastructure
            docker-compose up -d --build --no-deps $SERVICE_NAME
            echo "✅ $SERVICE_NAME muvaffaqiyatli yangilandi!"

      - name: Send Telegram Notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *HiWelcome Notification* 🚀
            
            👤 *User:* ${{ github.actor }}
            📦 *Service:* `hw-logistics-service` 
            📝 *Commit:* ${{ github.event.head_commit.message }}
            ✅ *Status:* Successfully Deployed!
            
            🌐 [API Docs](https://api.hiwelcome.uz/docs)
